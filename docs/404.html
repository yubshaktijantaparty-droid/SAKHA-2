<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAKHA AI - Premium AI Assistant</title>
    <script>
      // Redirect to index.html for GitHub Pages SPA routing
      const pathname = window.location.pathname;
      const search = window.location.search;
      const hash = window.location.hash;
      
      // Check if the pathname doesn't have a file extension
      if (!pathname.match(/\.[a-z]+$/i) && pathname !== '/SAKHA-2/' && pathname !== '/SAKHA-2') {
        // Redirect to index.html preserving the path for SPA
        window.location.replace('/SAKHA-2/?' + encodeURIComponent(pathname + search + hash));
      } else if (pathname === '/SAKHA-2/' || pathname === '/SAKHA-2') {
        // Already at the root, just load index.html
        window.location.href = '/SAKHA-2/';
      }
    </script>
  </head>
  <body>
  </body>
</html>
