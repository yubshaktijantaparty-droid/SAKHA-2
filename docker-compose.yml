version: '3.8'

services:
  # Main Bot Application
  sakha-bot:
    build: .
    container_name: sakha-bot
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENVIRONMENT=production
      - DEBUG_MODE=False
    depends_on:
      - mongodb
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - sakha-network

  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: sakha-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-password}
      MONGO_INITDB_DB: sakha_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - sakha-network

volumes:
  mongodb_data:

networks:
  sakha-network:
    driver: bridge
