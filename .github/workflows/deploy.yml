name: Deploy to GitHub Pages & Backend

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Build frontend
        run: |
          cd frontend
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:8000' }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_REPO_NAME: sakha-ai
          NODE_ENV: production
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
          cname: ${{ secrets.CUSTOM_DOMAIN }}
      
      - name: Frontend deployed successfully
        run: echo "✓ Frontend deployed to GitHub Pages"

  deploy-backend:
    runs-on: ubuntu-latest
    needs: [deploy-frontend]
    if: success()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to Render
        if: ${{ secrets.RENDER_DEPLOY_KEY != '' }}
        run: |
          RENDER_DEPLOY_URL="https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_DEPLOY_KEY }}"
          echo "Triggering Render deployment..."
          curl -X GET "$RENDER_DEPLOY_URL" || echo "Note: Render deployment notification sent"
        continue-on-error: true
      
      - name: Backend deployment triggered
        run: echo "✓ Backend deployment initiated"

  verify-deployment:
    runs-on: ubuntu-latest
    needs: [deploy-frontend]
    if: success()
    
    steps:
      - name: Wait for deployment
        run: sleep 30
      
      - name: Check frontend availability
        run: |
          FRONTEND_URL="https://${{ github.repository_owner }}.github.io/sakha-ai"
          echo "Checking frontend: $FRONTEND_URL"
          curl -f -s "$FRONTEND_URL" > /dev/null && echo "✓ Frontend is live!" || echo "Note: Frontend still deploying..."
        continue-on-error: true
      
      - name: Check backend health
        if: ${{ secrets.VITE_API_URL != '' }}
        run: |
          echo "Checking backend: ${{ secrets.VITE_API_URL }}/api/health"
          curl -f -s "${{ secrets.VITE_API_URL }}/api/health" > /dev/null && echo "✓ Backend is responding!" || echo "Note: Backend still starting..."
        continue-on-error: true
      
      - name: Deployment summary
        run: |
          echo ""
          echo "========================================"
          echo "  ✓ Deployment Pipeline Complete!"
          echo "========================================"
          echo ""
          echo "Frontend URL: https://${{ github.repository_owner }}.github.io/sakha-ai"
          echo "API Base: ${{ secrets.VITE_API_URL || 'Not configured' }}"
          echo ""
          echo "Next: Test the deployment and verify all features work"
          echo ""
